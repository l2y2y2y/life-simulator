<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>人生模拟器 - 重开你的人生</title>
  <!-- Google Fonts (mirror) -->
  <link rel="preconnect" href="https://fonts.loli.net">
  <link href="https://fonts.loli.net/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* 初始加载动画 */
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg-base);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    .loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .loading-text {
      font-family: var(--font-display);
      font-size: 18px;
      color: var(--accent-gold);
      margin-bottom: 20px;
      letter-spacing: 0.1em;
    }
    .loading-bar {
      width: 200px;
      height: 4px;
      background: var(--border-subtle);
      border-radius: 2px;
      overflow: hidden;
    }
    .loading-bar-inner {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--accent-gold), #a8854a);
      transition: width 0.3s ease;
      border-radius: 2px;
    }
  </style>
  <meta name="theme-color" content="#0d0d12">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
  <div class="landscape-warning" id="landscapeWarning">
    <div class="rotate-icon">🔄</div>
    <p>请竖屏使用以获得最佳体验</p>
  </div>
  <!-- 加载画面 -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-text">正在加载人生...</div>
    <div class="loading-bar">
      <div class="loading-bar-inner" id="loadingBar"></div>
    </div>
  </div>

  <div class="container">
    <!-- ==================== 首页 ==================== -->
    <div class="page home-page active" id="homePage">
      <div class="home-divider"></div>
      <h1 class="game-title">人生模拟器</h1>
      <p class="game-subtitle letter-wide">重开你的人生</p>
      
      <div class="home-stats-row">
        <div class="stat-item">
          <div class="stat-value" id="statLifeCount">0</div>
          <div class="stat-label">次数</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="statHighScore">0</div>
          <div class="stat-label">最高分</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="statAchievements">0</div>
          <div class="stat-label">成就</div>
        </div>
        <div class="stat-item">
          <div class="stat-value stat-value-coin"><span class="coin-icon">G</span><span id="statFateCoins">0</span></div>
          <div class="stat-label">命运币</div>
        </div>
      </div>
      
      <button class="btn btn-primary start-btn" id="startBtn">开始新人生</button>
      <br>
      <button class="btn btn-text" id="achievementBtn">查看成就</button>
      
      <details class="daily-goals-details">
        <summary class="daily-goals-summary">每日目标</summary>
        <div class="card-tertiary daily-goals-card">
          <div class="daily-goals-content">
            <div id="dailyGoalsContainer"></div>
          </div>
        </div>
      </details>
    </div>

    <!-- ==================== 开场过渡页（你死了） ==================== -->
    <div class="page rebirth-page" id="rebirthPage">
      <div class="rebirth-overlay"></div>
      <div class="rebirth-content">
        <div class="rebirth-age" id="rebirthAge"></div>
        <div class="rebirth-death" id="rebirthDeath"></div>
        <div class="rebirth-regret" id="rebirthRegret"></div>
        <div class="rebirth-question">你想重来一次吗？</div>
        <div class="rebirth-buttons">
          <button class="btn btn-primary rebirth-btn" id="rebirthBtn">不甘重来</button>
        </div>
      </div>
    </div>

    <!-- ==================== 天赋选择页 ==================== -->
    <div class="page talent-page" id="talentPage">
      <div class="card">
        <div class="talent-page-header">
          <div>
            <h2 class="card-title">命运之手</h2>
            <p class="card-subtitle">选择三个天赋开启你的人生</p>
          </div>
          <div class="talent-counter-badge">
            <span id="talentCount">0</span> / 3
          </div>
        </div>
        <div class="talent-counter">已选择：<span id="talentCountText">0</span> / 3</div>
        <div class="talent-grid" id="talentGrid"></div>
        <div class="talent-selected-pool" id="talentSelectedPool">
          <div class="talent-pool-label">已选天赋</div>
          <div class="talent-pool-tags" id="talentPoolTags">
            <span class="talent-pool-empty">点击上方天赋卡片选择</span>
          </div>
        </div>
        <button class="btn btn-secondary" id="refreshTalentsBtn">换一批</button>
      </div>
      <button class="btn btn-primary" id="confirmTalentsBtn" disabled>确认选择</button>
      <button class="btn btn-text" id="backFromTalentBtn">返回</button>
    </div>

    <!-- ==================== 属性分配页 ==================== -->
    <div class="page attribute-page" id="attributePage">
      <div class="card">
        <h2 class="card-title">初始属性</h2>
        <p class="card-subtitle">塑造你的起点</p>
        <div class="points-remaining">
          <span class="points-label">剩余点数</span>
          <span class="points-value" id="pointsRemaining">20</span>
        </div>
        <div class="attribute-slider-list" id="attributeSliderList"></div>
        <div class="attribute-presets">
          <span class="presets-label">快速预设</span>
          <div class="presets-buttons">
            <button class="btn btn-preset" data-preset="scholar">学霸</button>
            <button class="btn btn-preset" data-preset="athlete">体育生</button>
            <button class="btn btn-preset" data-preset="rich">富二代</button>
            <button class="btn btn-preset" data-preset="balanced">均衡</button>
          </div>
        </div>
        <button class="btn btn-secondary random-btn" id="randomAttrBtn">随机分配</button>
      </div>
      <button class="btn btn-primary" id="confirmAttrBtn">开始人生</button>
      <button class="btn btn-text" id="backFromAttrBtn">返回</button>
    </div>

    <!-- ==================== 游戏进行页 ==================== -->
    <div class="page game-page" id="gamePage">
      <div class="game-layout">
        <!-- 侧边栏遮罩 (desktop only) -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- 左侧栏：属性面板 (desktop only) -->
        <div class="game-sidebar">
          <div class="attributes-panel" id="attributesPanel"></div>
          <div class="hidden-attrs-panel" id="hiddenAttrsPanel">
            <div class="hidden-attr-item">
              <span class="hidden-attr-name">快乐</span>
              <div class="hidden-attr-bar"><div class="hidden-attr-fill happiness-fill" id="happinessBar"></div></div>
              <span class="hidden-attr-val" id="happinessVal">--</span>
            </div>
            <div class="hidden-attr-item">
              <span class="hidden-attr-name">压力</span>
              <div class="hidden-attr-bar"><div class="hidden-attr-fill stress-fill" id="stressBar"></div></div>
              <span class="hidden-attr-val" id="stressVal">--</span>
            </div>
            <div class="hidden-attr-item">
              <span class="hidden-attr-name">健康</span>
              <div class="hidden-attr-bar"><div class="hidden-attr-fill health-fill" id="healthBar"></div></div>
              <span class="hidden-attr-val" id="healthVal">--</span>
            </div>
          </div>
        </div>

        <!-- 右侧主区域 -->
        <div class="game-main">
          <!-- 顶部信息栏 -->
          <div class="game-header">
            <div>
              <div class="age-display" id="ageDisplay">0岁</div>
              <div class="stage-display" id="stageDisplay">婴幼儿期</div>
            </div>
            <div class="game-controls">
              <button class="btn btn-icon toggle-sidebar-btn" id="toggleSidebarBtn">📊</button>
              <button class="btn btn-secondary control-btn" id="pauseBtn">暂停</button>
              <button class="btn btn-secondary control-btn" id="skipBtn">跳过</button>
              <div class="speed-control" id="speedControl">
                <button class="speed-btn" data-speed="0.5">0.5x</button>
                <button class="speed-btn active" data-speed="1">1x</button>
                <button class="speed-btn" data-speed="2">2x</button>
              </div>
            </div>
          </div>

          <!-- ====== 移动端 Tab 导航容器 ====== -->
          <div class="mobile-tab-container" id="mobileTabContainer">
            <!-- Tab 1: 当前事件 -->
            <div class="mobile-tab-panel active" data-tab="event" id="mobileTabEvent">
              <div class="event-area" id="eventArea"></div>
            </div>

            <!-- Tab 2: 属性面板 -->
            <div class="mobile-tab-panel" data-tab="attrs" id="mobileTabAttrs">
              <div class="mobile-attrs-panel">
                <div class="attr-overview-row" id="attrOverviewRow"></div>
                <div class="mobile-hidden-attrs">
                  <div class="mobile-hidden-attr-row">
                    <span class="attr-overview-bar-name">快乐</span>
                    <div class="progress-bar attr-overview-bar-track"><div class="progress-fill happiness-fill" id="overviewHappinessBar"></div></div>
                    <span class="mobile-attr-val" id="overviewHappinessVal">50</span>
                  </div>
                  <div class="mobile-hidden-attr-row">
                    <span class="attr-overview-bar-name">压力</span>
                    <div class="progress-bar attr-overview-bar-track"><div class="progress-fill stress-fill" id="overviewStressBar"></div></div>
                    <span class="mobile-attr-val" id="overviewStressVal">0</span>
                  </div>
                  <div class="mobile-hidden-attr-row">
                    <span class="attr-overview-bar-name">健康</span>
                    <div class="progress-bar attr-overview-bar-track"><div class="progress-fill health-fill" id="overviewHealthBar"></div></div>
                    <span class="mobile-attr-val" id="overviewHealthVal">70</span>
                  </div>
                </div>
                <div class="mobile-wealth-row">
                  <span class="coin-icon">G</span>
                  <span id="overviewWealthVal">0</span>
                </div>
              </div>
            </div>

            <!-- Tab 3: 历史记录 -->
            <div class="mobile-tab-panel" data-tab="history" id="mobileTabHistory">
              <div class="history-area" id="historyArea"></div>
            </div>
          </div>

          <!-- 移动端底部 Tab 栏 -->
          <nav class="mobile-tab-bar" id="mobileTabBar">
            <button class="mobile-tab-btn active" data-tab="event">
              <span class="mobile-tab-icon">📖</span>
              <span class="mobile-tab-label">当前</span>
            </button>
            <button class="mobile-tab-btn" data-tab="attrs">
              <span class="mobile-tab-icon">📊</span>
              <span class="mobile-tab-label">属性</span>
            </button>
            <button class="mobile-tab-btn" data-tab="history">
              <span class="mobile-tab-icon">📜</span>
              <span class="mobile-tab-label">记录</span>
              <span class="mobile-tab-badge" id="historyBadge" style="display:none">0</span>
            </button>
          </nav>

          <!-- 旧版概览条和折叠按钮 — 桌面端保留但隐藏 -->
          <div class="attr-overview-bar" id="attrOverviewBar">
            <div class="attr-overview-row" id="attrOverviewRowDesktop"></div>
            <div class="attr-overview-hidden" id="attrOverviewHidden">
              <div class="attr-overview-bar-item">
                <span class="attr-overview-bar-name">快乐</span>
                <div class="progress-bar attr-overview-bar-track"><div class="progress-fill happiness-fill" id="overviewHappinessBarDesktop"></div></div>
              </div>
              <div class="attr-overview-bar-item">
                <span class="attr-overview-bar-name">压力</span>
                <div class="progress-bar attr-overview-bar-track"><div class="progress-fill stress-fill" id="overviewStressBarDesktop"></div></div>
              </div>
              <div class="attr-overview-bar-item">
                <span class="attr-overview-bar-name">健康</span>
                <div class="progress-bar attr-overview-bar-track"><div class="progress-fill health-fill" id="overviewHealthBarDesktop"></div></div>
              </div>
              <div class="attr-overview-wealth">
                <span class="coin-icon">G</span>
                <span id="overviewWealthValDesktop">0</span>
              </div>
            </div>
          </div>

          <div class="history-area" id="historyAreaDesktop"></div>
          <div class="history-toggle" id="historyToggle">查看历史记录 ▼</div>
        </div>
      </div>
    </div>

    <!-- ==================== 结局页 ==================== -->
    <div class="page result-page" id="resultPage">
      <h2 class="result-title" id="resultTitle">人生终章</h2>
      <p class="result-subtitle" id="resultSubtitle">你度过了平凡的一生</p>
      
      <div class="result-grade" id="resultGrade"></div>

      <div class="score-display" id="scoreDisplay">0</div>
      <p class="score-label">人生评分</p>
      
      <div class="result-tags" id="resultTags"></div>
      
      <details class="result-details-section">
        <summary class="result-details-summary">查看详情</summary>
        <div class="card">
          <h3 class="card-title">评分详情</h3>
          <div class="score-breakdown" id="scoreBreakdown"></div>
        </div>
        
        <div class="share-card" id="shareCard">
        <div class="share-card-title">分享你的人生</div>
        <div class="share-card-content" id="shareContent"></div>
        <div class="share-card-score" id="shareScore">0分</div>
      </div>
      <div class="share-preview" id="sharePreview">
        <canvas id="shareCanvas" width="750" height="1000" style="display:none;"></canvas>
        <img id="shareImage" alt="分享卡片" style="max-width:100%;height:auto;border-radius:16px;">
      </div>
      </details>
      <div class="result-actions-primary">
        <button class="btn btn-primary start-btn" id="restartBtn">重开人生</button>
        <button class="btn btn-secondary" id="challengeBtn">挑战模式</button>
      </div>
      <div class="result-actions-secondary">
        <button class="btn btn-text" id="downloadCardBtn">下载卡片</button>
        <button class="btn btn-text" id="shareBtn">分享结果</button>
        <button class="btn btn-text" id="homeBtn">返回首页</button>
      </div>
    </div>

    <!-- ==================== 成就页 ==================== -->
    <div class="page achievement-page" id="achievementPage">
      <div class="card">
        <h2 class="card-title">成就系统</h2>
        <div class="talent-counter">已解锁：<span id="achievementCount">0</span> / <span id="achievementTotal">0</span></div>
        <div id="achievementList"></div>
      </div>
      <button class="btn btn-text" id="backFromAchievementBtn">返回</button>
    </div>
  </div>

  <!-- 成就弹窗容器 -->
  <div id="achievementPopupContainer"></div>

  <!-- Toast 提示容器 -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- 脚本文件 -->
  <script src="js/data/talents.js"></script>
  <script src="js/data/events.js"></script>
  <script src="js/data/achievements.js"></script>
  <script src="js/core/AttributeSystem.js"></script>
  <script src="js/core/EventEngine.js"></script>
  <script src="js/core/ScoringSystem.js"></script>
  <script src="js/core/GameManager.js"></script>
  <script src="js/core/ShareCardGenerator.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
